experiment:
  name: dl_baseline_v3_window04_hop01_fft256_hop64
  task: cough_detection

data:
  metadata: data/metadata.csv

sampling:
  audio_hz: 4800
  motion_hz: 100

windowing:
  window_sec: 0.4
  hop_sec: 0.1
  label_rule: center_positive
  center_fraction: 0.2

spectrogram:
  n_fft: 256
  hop_length: 64
  n_mels: 64
  f_min: 60
  f_max: 2200
  log_eps: 1.0e-9

model:
  audio_input: log_mel_spectrogram
  audio_branch: conv2d
  motion_branch: conv1d
  fusion: late

training:
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 25
  scheduler: reduce_lr_on_plateau
