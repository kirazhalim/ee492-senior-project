experiment:
  name: final_v1_clean_raw_waveform
  task: cough_detection

data:
  metadata: data/clean_v4/metadata.csv
  data_root: data

split:
  strategy: record_holdout
  stratify_by: activity
  seed: 42
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15

sampling:
  audio_hz: 4800
  motion_hz: 100

windowing:
  window_sec: 1.0
  hop_sec: 0.5
  label_rule: any_positive
  center_fraction: 0.2

model:
  audio_input: filtered_waveform
  audio_branch: conv1d
  motion_branch: conv1d
  fusion: late

training:
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 15
