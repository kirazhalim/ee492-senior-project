experiment:
  name: final_ee491_classical_clean
  task: cough_detection_classical_ml

data:
  metadata: data/clean_v4/metadata.csv
  data_root: data

split:
  strategy: record_holdout
  stratify_by: activity
  seed: 42
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15

sampling:
  audio_hz: 4800
  motion_hz: 100

windowing:
  window_sec: 0.2
  hop_sec: 0.05
  label_rule: overlap_rule_c
  label_overlap_tau: 0.2

model:
  type: xgboost
  fallback: hist_gradient_boosting
  n_estimators: 400
  max_depth: 4
  max_iter: 400
  max_leaf_nodes: 31
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  min_child_weight: 1.0
  gamma: 0.0

event:
  iou_threshold: 0.2
  gt_min_duration_sec: 0.0
  gt_merge_gap_sec: 0.0

postprocessing_sweep:
  thresholds: [0.50, 0.60, 0.70, 0.80, 0.90, 0.95]
  pred_min_duration_sec: [0.0, 0.1, 0.15, 0.2]
  pred_merge_gap_sec: [0.0, 0.05, 0.1, 0.2]
