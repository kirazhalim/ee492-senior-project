experiment:
  name: final_v5_ast_clean
  task: cough_detection_ast_motion_fusion

data:
  metadata: data/clean_v4/metadata.csv
  data_root: data

split:
  strategy: record_holdout
  stratify_by: activity
  seed: 42
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15

sampling:
  audio_hz: 4800
  motion_hz: 100

windowing:
  window_sec: 0.4
  hop_sec: 0.1
  label_rule: center_positive
  center_fraction: 0.2

ast:
  model_name: MIT/ast-finetuned-audioset-10-10-0.4593
  sample_rate: 16000
  embedding_dim: 768
  audio_channel: pulmonary
  embedding_batch_size: 32

model:
  audio_input: frozen_ast_embedding
  motion_branch: conv1d
  fusion: late

training:
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 32
  epochs: 25

event:
  iou_threshold: 0.2
  gt_min_duration_sec: 0.1
  gt_merge_gap_sec: 0.1
  pred_min_duration_sec: 0.1
  pred_merge_gap_sec: 0.1

postprocessing_sweep:
  thresholds: [0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  smoothing_sec: [0.0, 0.1, 0.2, 0.3]
  span_modes: [full, hop, center]
  pred_min_duration_sec: [0.1, 0.2]
  pred_merge_gap_sec: [0.0, 0.1, 0.2, 0.3]
