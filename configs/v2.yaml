experiment:
  name: dl_baseline_v2
  task: cough_detection

data:
  metadata: data/metadata.csv

sampling:
  audio_hz: 4800
  motion_hz: 100

windowing:
  window_sec: 1.0
  hop_sec: 0.25
  label_rule: center_positive
  center_fraction: 0.2

augmentation:
  awgn: true
  circular_shift: false

model:
  audio_input: raw_waveform
  audio_branch: conv1d
  motion_branch: conv1d
  fusion: late

training:
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 25
  scheduler: reduce_lr_on_plateau

